syntax = "proto3";

package runtime.v1;

service RuntimeLauncher {
  rpc Start (StartRequest) returns (StartResponse) {}
  rpc Delete (DeleteRequest) returns (DeleteResponse) {}
  rpc Wait (WaitRequest) returns (WaitResponse) {}
}

message RootfsSpec {
  string imageUrl = 1;
  bool readonly = 2;
}

message Mount {
  // the nature of the mount
  string type = 1;
  // source specifies the name of the mount. 
  string source = 2;
  // targe path in container which must existed in rootfs
  string target = 3;
  // options sepcifies zero or more fstab style mount options
  repeated string options = 4;
}


message StartRequest {
  string runtime = 1;
  repeated string command = 2;
  RootfsSpec rootfs = 3;
  repeated Mount mounts = 4;
  // resource request of function
  // etc: CPU millicore​
  //      Memory MB 
  map<string, double> resources = 5;
  map<string, string> runtimeEnvs = 6;
  map<string, string> userEnvs = 7;
  // string envsFile = 9;
  // redirect path for stdout
  string stdout = 8;
  // redirect path for stderr
  string stderr = 9;
}

message StartResponse {
  // success:0
  int32 code = 1;
  // message indicating details about why start return with specific code
  string message = 2;
  // unique id of process/container
  string id = 3;
}

message DeleteRequest {
  string id = 1;
  // timeout in seconds to wait for the process/container to graceful stop before force delete
  int64 timeout = 2;
}

message DeleteResponse {}

message WaitRequest {
  string id = 1;
}

message WaitResponse {
  int32 status = 1;
  // Exit code of the container. Only required when finished_at != 0. Default: 0.
  int32 exit_code = 2;
  // Human-readable message indicating details about why container is in its
  // current state.
  string message = 3;
}