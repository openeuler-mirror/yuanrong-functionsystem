syntax = "proto3";

package runtime.v1;

service RuntimeLauncher {
  rpc Start(StartRequest) returns (StartResponse) {}
  rpc Delete(DeleteRequest) returns (DeleteResponse) {}
  rpc Wait(WaitRequest) returns (WaitResponse) {}
  rpc Register(RegisterRequest) returns (NormalResponse) {}
  rpc Unregister(UnregisterRequest) returns (NormalResponse) {}
  rpc GetRegistered(GetRegisteredRequest) returns (GetRegisteredResponse) {} 
}

enum RootfsSrcType {
  S3 = 0;
  IMAGE = 1;
}

message S3Config {
  string Endpoint = 1;
  string Bucket = 2;
  string Object = 3;
  string AccessKeyID = 4;     // omitempty
  string AccessKeySecret = 5; // omitempty
}

message RootfsConfig {
  bool readonly = 2;
  RootfsSrcType type = 3;
  S3Config s3Config = 4;
  string imageUrl = 5;
}

message Mount {
  // Type defines the nature of the mount.
  string type = 1;

  // Source specifies the name of the mount. Depending on mount type, this
  // may be a volume name or a host path, or even ignored.
  string source = 2;

  // Target path in container
  string target = 3;

  // Options specifies zero or more fstab style mount options.
  repeated string options = 4;
}

message StartRequest {
  string runtime = 1;
  repeated string command = 2;
  RootfsConfig rootfs = 3;
  repeated Mount mounts = 4;
  // resource request of function
  // etc: CPU millicore​
  //      Memory MB
  map<string, double> resources = 5;
  map<string, string> runtimeEnvs = 6;
  map<string, string> userEnvs = 7;
  // string envsFile = 9;
  // redirect path for stdout
  string stdout = 8;
  // redirect path for stderr
  string stderr = 9;
}

message StartResponse {
  // success:0
  int32 code = 1;
  // message indicating details about why start return with specific code
  string message = 2;
  // unique id of process/container
  string id = 3;
}

message DeleteRequest {
  string id = 1;
  // timeout in seconds to wait for the process/container to graceful stop
  // before force delete
  int64 timeout = 2;
}

message DeleteResponse {}

message WaitRequest { string id = 1; }

message WaitResponse {
  int32 status = 1;
  // Exit code of the container. Only required when finished_at != 0. Default:
  // 0.
  int32 exit_code = 2;
  // Human-readable message indicating details about why container is in its
  // current state.
  string message = 3;
}

message WarmUpRuntime {
  string id = 1;
  RootfsConfig rootfs = 2;
  bool makeSeed = 3;

  // used during making seed.
  repeated string command = 4;
  map<string, string> runtimeEnvs = 5;
}

message RegisterRequest {
  repeated WarmUpRuntime langRuntimes = 1;
}

message NormalResponse {
  bool success = 1;
  string message = 2;
}

message UnregisterRequest {
  repeated string ids = 1;
}

message GetRegisteredRequest {}

message GetRegisteredResponse {
  repeated WarmUpRuntime langRuntimes = 1;
}