syntax = "proto3";

package frontend_proxy;

import "common.proto";
import "core_service.proto";

option go_package = "functionsystem/pkg/common/faas_common/grpc/pb/frontend_proxy;frontend_proxy";

// FrontendProxyService is the frontend-facing entrypoint used by faasfrontend
// when it already owns the target proxy route. It is intentionally narrower
// than the runtime POSIX stream API: frontend is a system-service caller, not a
// runtime instance, so request identity and the result sink are explicit in this API.
//
// Requests wrap the existing core_service create/invoke/kill messages. The proxy
// implementation can adapt them to runtime_rpc.StreamingMessage internally
// without exposing the full stream oneof to frontend.
service FrontendProxyService {
  rpc InvokeInstance (InvokeInstanceRequest) returns (InvokeInstanceResponse) {}
  rpc CreateInstance (CreateInstanceRequest) returns (CreateInstanceResponse) {}
  rpc KillInstance (KillInstanceRequest) returns (KillInstanceResponse) {}
}

message FrontendRequestContext {
  // frontendClientID identifies the frontend service/client for observability.
  // It is caller-supplied metadata, not an authorization identity, runtime
  // instance id, or old POSIX `from` value.
  string frontendClientID = 1;
  // Required for create/invoke/kill. Current core_service.InvokeRequest has no
  // tenant field, so frontend must populate this context field. Proxy validates
  // consistency with any tenant label, but this is not transport authentication.
  string tenantID         = 2;
  string requestID        = 3;
  string traceID          = 4;
  // callerInstanceID is optional metadata for true function-internal calls.
  // Ordinary external frontend requests leave it empty, and proxy must not use
  // this caller-supplied field as authorization evidence.
  string callerInstanceID = 5;
  map<string, string> labels = 6;
}

message FrontendProxyStatus {
  common.ErrorCode code = 1;
  string message        = 2;
  // retryable tells frontend whether it should re-acquire/retry instead of
  // expecting proxy-to-proxy forwarding.
  bool retryable        = 3;
  string retryReason    = 4;
}

message InvokeInstanceRequest {
  FrontendRequestContext context = 1;
  core_service.InvokeRequest invoke = 2;
}

message InvokeInstanceResponse {
  FrontendProxyStatus status = 1;
  core_service.InvokeResponse invoke = 2;
  // callResult carries the final small-object / runtime result that old stream
  // paths delivered asynchronously. Frontend may adapt it to its local result
  // store for compatibility with InvokeByInstanceId + GetAsync.
  core_service.CallResult callResult = 3;
}

message CreateInstanceRequest {
  FrontendRequestContext context = 1;
  core_service.CreateRequest create = 2;
}

message CreateInstanceResponse {
  FrontendProxyStatus status = 1;
  core_service.CreateResponse create = 2;
  string routeAddress = 3;
  // callResult carries the final ready NotifyRequest-compatible result for
  // raw create compatibility.
  core_service.CallResult callResult = 4;
}

message KillInstanceRequest {
  FrontendRequestContext context = 1;
  core_service.KillRequest kill = 2;
}

message KillInstanceResponse {
  FrontendProxyStatus status = 1;
  core_service.KillResponse kill = 2;
}
