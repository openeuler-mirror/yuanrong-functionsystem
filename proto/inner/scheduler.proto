syntax = "proto3";

package yr.internal;

// Internal gRPC services replacing LiteBus inter-process messages.
// Self-contained types (no cross-package imports) to avoid protobuf module path issues.

service GlobalSchedulerService {
  rpc Register (RegisterRequest) returns (RegisterResponse) {}
  rpc UpdateResources (UpdateResourcesRequest) returns (UpdateResourcesResponse) {}
  rpc QueryAgents (QueryAgentsRequest) returns (QueryAgentsResponse) {}
  rpc QueryAgentCount (QueryAgentCountRequest) returns (QueryAgentCountResponse) {}
  rpc EvictAgent (EvictAgentRequest) returns (EvictAgentResponse) {}
}

service DomainSchedulerService {
  rpc Schedule (ScheduleRequest) returns (ScheduleResponse) {}
  rpc ForwardSchedule (ScheduleRequest) returns (ScheduleResponse) {}
  rpc GroupSchedule (GroupScheduleRequest) returns (GroupScheduleResponse) {}
  rpc NotifyWorkerStatus (WorkerStatusNotification) returns (WorkerStatusResponse) {}
  rpc Heartbeat (HeartbeatPing) returns (HeartbeatPong) {}
}

service LocalSchedulerService {
  rpc Schedule (ScheduleRequest) returns (ScheduleResponse) {}
  rpc EvictInstances (EvictInstancesRequest) returns (EvictInstancesResponse) {}
  rpc PreemptInstances (PreemptInstancesRequest) returns (PreemptInstancesResponse) {}
  rpc GroupSchedule (GroupScheduleRequest) returns (GroupScheduleResponse) {}
  rpc KillGroup (KillGroupRequest) returns (KillGroupResponse) {}
}

service FunctionAgentService {
  rpc StartInstance (StartInstanceRequest) returns (StartInstanceResponse) {}
  rpc StopInstance (StopInstanceRequest) returns (StopInstanceResponse) {}
  rpc DeployInstance (DeployInstanceRequest) returns (DeployInstanceResponse) {}
  rpc UpdateInstanceStatus (UpdateInstanceStatusRequest) returns (UpdateInstanceStatusResponse) {}
  rpc UpdateResources (UpdateResourcesRequest) returns (UpdateResourcesResponse) {}
}

service RuntimeManagerService {
  rpc StartInstance (StartInstanceRequest) returns (StartInstanceResponse) {}
  rpc StopInstance (StopInstanceRequest) returns (StopInstanceResponse) {}
  rpc SnapshotRuntime (SnapshotRequest) returns (SnapshotResponse) {}
  rpc GetRuntimeStatus (RuntimeStatusRequest) returns (RuntimeStatusResponse) {}
}

// Registration
message RegisterRequest {
  string node_id = 1;
  string address = 2;
  string resource_json = 3;
  string agent_info_json = 4;
}

message RegisterResponse {
  bool success = 1;
  string message = 2;
  string domain_address = 3;
  string topology = 4;
}

// Resource updates
message UpdateResourcesRequest {
  string node_id = 1;
  string resource_json = 2;
}

message UpdateResourcesResponse {
  bool success = 1;
}

// Agent queries
message QueryAgentsRequest {
  string filter = 1;
}

message QueryAgentsResponse {
  string agents_json = 1;
}

message QueryAgentCountRequest {}
message QueryAgentCountResponse {
  int64 count = 1;
}

// Eviction
message EvictAgentRequest {
  string node_id = 1;
  string reason = 2;
}

message EvictAgentResponse {
  bool success = 1;
}

message EvictInstancesRequest {
  repeated string instance_ids = 1;
  string reason = 2;
}

message EvictInstancesResponse {
  bool success = 1;
  repeated string evicted_ids = 2;
}

message PreemptInstancesRequest {
  repeated string instance_ids = 1;
  int32 priority = 2;
}

message PreemptInstancesResponse {
  bool success = 1;
  repeated string preempted_ids = 2;
}

// Scheduling
message ScheduleRequest {
  string request_id = 1;
  string tenant_id = 2;
  string function_name = 3;
  string function_version = 4;
  map<string, double> required_resources = 5;
  int32 priority = 6;
  map<string, string> labels = 7;
  map<string, string> extension = 8;
  string designated_instance_id = 9;
  bytes args_payload = 10;
  string updated_resource_json = 11;
  string source_node_id = 12;
  int64 schedule_timeout_ms = 13;
  string trace_id = 14;
}

message ScheduleResponse {
  bool success = 1;
  int32 error_code = 2;
  string message = 3;
  string instance_id = 4;
  string node_id = 5;
  string node_address = 6;
}

// Group scheduling
message GroupScheduleRequest {
  repeated ScheduleRequest requests = 1;
  string group_id = 2;
  string tenant_id = 3;
  int64 timeout_sec = 4;
  string group_name = 5;
  bool same_running_lifecycle = 6;
}

message GroupScheduleResponse {
  bool success = 1;
  int32 error_code = 2;
  string message = 3;
  repeated string instance_ids = 4;
  string group_id = 5;
}

// Worker status
message WorkerStatusNotification {
  string node_id = 1;
  string status = 2;
  string reason = 3;
}

message WorkerStatusResponse {
  bool acknowledged = 1;
}

// Heartbeat
message HeartbeatPing {
  string node_id = 1;
  int64 timestamp_ms = 2;
}

message HeartbeatPong {
  int64 timestamp_ms = 1;
}

// Kill group
message KillGroupRequest {
  string group_id = 1;
  int32 signal = 2;
}

message KillGroupResponse {
  bool success = 1;
}

// Instance management
message StartInstanceRequest {
  string instance_id = 1;
  string function_name = 2;
  string tenant_id = 3;
  string runtime_type = 4;
  map<string, string> env_vars = 5;
  map<string, double> resources = 6;
  string code_path = 7;
  string config_json = 8;
}

message StartInstanceResponse {
  bool success = 1;
  string message = 2;
  string runtime_id = 3;
  int32 runtime_port = 4;
}

message StopInstanceRequest {
  string instance_id = 1;
  string runtime_id = 2;
  bool force = 3;
}

message StopInstanceResponse {
  bool success = 1;
  string message = 2;
}

message DeployInstanceRequest {
  string instance_id = 1;
  string function_name = 2;
  string tenant_id = 3;
  string code_uri = 4;
  string deploy_mode = 5;
}

message DeployInstanceResponse {
  bool success = 1;
  string message = 2;
  string local_path = 3;
}

message UpdateInstanceStatusRequest {
  string instance_id = 1;
  string runtime_id = 2;
  string status = 3;
  int32 exit_code = 4;
  string error_message = 5;
}

message UpdateInstanceStatusResponse {
  bool acknowledged = 1;
}

// Snapshot
message SnapshotRequest {
  string instance_id = 1;
  string runtime_id = 2;
  int32 snap_type = 3;
}

message SnapshotResponse {
  bool success = 1;
  string snapshot_id = 2;
}

// Runtime status
message RuntimeStatusRequest {
  string runtime_id = 1;
}

message RuntimeStatusResponse {
  string status = 1;
  int32 exit_code = 2;
}
