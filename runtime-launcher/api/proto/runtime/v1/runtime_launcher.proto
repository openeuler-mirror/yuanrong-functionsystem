syntax = "proto3";

package runtime.v1;

option go_package = "runtime-launcher/api/proto/runtime/v1;runtimev1";

service RuntimeLauncher {
  rpc Start(StartRequest) returns (StartResponse) {}
  rpc Delete(DeleteRequest) returns (DeleteResponse) {}
  rpc Wait(WaitRequest) returns (WaitResponse) {}
  rpc Register(RegisterRequest) returns (NormalResponse) {}
  rpc Unregister(UnregisterRequest) returns (NormalResponse) {}
  rpc GetRegistered(GetRegisteredRequest) returns (GetRegisteredResponse) {}
  rpc Checkpoint(CheckpointRequest) returns (CheckpointResponse) {}

  // List lists all containers by filters.
  rpc List(ListContainersRequest) returns (ListContainersResponse) {}

  // Stats returns resource usage statistics for a container.
  rpc Stats(StatsRequest) returns (StatsResponse) {}

  // Version returns the runtime name, runtime version, and runtime API version.
  rpc Version(VersionRequest) returns (VersionResponse) {}
}

enum RootfsSrcType {
  S3    = 0;
  IMAGE = 1;
  LOCAL = 2;
}

message S3Config {
  string Endpoint        = 1;
  string Bucket          = 2;
  string Object          = 3;
  string AccessKeyID     = 4; // omitempty
  string AccessKeySecret = 5; // omitempty
}

message RootfsConfig {
  bool          readonly = 1;
  RootfsSrcType type     = 2;

  oneof source {
    string   image_url = 3;
    S3Config s3_config = 4;
    string   path      = 5;
  }
}

message Mount {
  // Type defines the nature of the mount (e.g. bind, volume, tmpfs).
  string type = 1;

  // Target path in container.
  string target = 2;

  // Options specifies zero or more fstab style mount options.
  repeated string options = 3;

  oneof source {
    // Host path (bind mount) or volume name.
    string host_path = 10;

    // S3-based mount source.
    S3Config s3_config = 11;

    // OCI image URL for image-based mount.
    string image_url = 12;
  }
}

message FunctionRuntime {
  string              id          = 1;
  string              sandbox     = 2;
  RootfsConfig        rootfs      = 3;
  bool                makeSeed    = 4;
  repeated string     command     = 5;
  map<string, string> runtimeEnvs = 6;
  string              cwd         = 7;
  repeated Mount      mounts      = 8;
}

message StartRequest {
  FunctionRuntime funcRuntime = 1;
  repeated Mount  mounts      = 2;
  // resource request of function
  // etc: CPU millicore​
  //      Memory MB
  map<string, double> resources = 3;
  map<string, string> userEnvs  = 4;
  // redirect path for stdout
  string stdout = 5;
  // redirect path for stderr
  string stderr = 6;
  // json string for customized config
  string extraConfig = 7;
  // network indicates the type of network the function use,
  // default is sandbox, support: sandbox, host, none
  string network  = 8;
  string ckpt_dir = 9;
  string trace_id = 10;
  // port format: 'protocol:dstPort:targetPort'
  repeated string ports = 11;
}

message StartResponse {
  // success:0
  int32 code = 1;
  // message indicating details about why start return with specific code
  string message = 2;
  // unique id of process/container
  string id = 3;
}

message DeleteRequest {
  string id = 1;
  // timeout in seconds to wait for the process/container to graceful stop
  // before force delete
  int64 timeout = 2;
}

message DeleteResponse {}

message WaitRequest { string id = 1; }

message WaitResponse {
  int32 status = 1;
  // Exit code of the container. Only required when finished_at != 0. Default:
  // 0.
  int32 exit_code = 2;
  // Human-readable message indicating details about why container is in its
  // current state.
  string message = 3;
}

message RegisterRequest { repeated FunctionRuntime funcRuntimes = 1; }

message NormalResponse {
  bool   success = 1;
  string message = 2;
}

message UnregisterRequest { repeated string ids = 1; }

message GetRegisteredRequest {}

message GetRegisteredResponse { repeated FunctionRuntime funcRuntimes = 1; }

message CheckpointRequest {
  string id       = 1;
  string ckpt_dir = 2;
  int64  timeout  = 3;
  bool   compress = 4;
  string trace_id = 5;
}

message CheckpointResponse {
  bool   success = 1;
  string message = 2;
}

message ListContainersRequest {
  // ID of the container.(equal to Get container xxx)
  string id = 1;

  // selector to list containers with specified labels.(default to all)
  map<string, string> selector = 10;
}

message ListContainersResponse {
  repeated ContainerStatus containers = 1;
}

enum ContainerState {
  CONTAINER_RUNNING = 0;
  CONTAINER_EXITED  = 1;
  CONTAINER_UNKNOWN = 2;
}

message ContainerStatus {
  string id = 1;
  repeated string command = 2;
  string runtime = 3;
  ContainerState state = 4;
  int64 started_at = 5;
  int64 finished_at = 6;
  int32 exit_code = 7;
  string message = 8;
  map<string,string> labels = 9;
  repeated Mount mounts = 10;
  repeated KeyValue envs = 11;
  string stdout = 12;
  string stderr = 13;
  LinuxContainerResources resources = 14;
}

message VersionRequest {
  string version = 1;
}

message VersionResponse {
  string version = 1;
  repeated RuntimeVersion runtimes = 2;
}

message RuntimeVersion {
  string runtime_name = 1;
  string runtime_version = 2;
}

message KeyValue {
  string key   = 1;
  string value = 2;
}

message LinuxContainerResources {
  uint64 cpu_period = 1;
  int64 cpu_quota = 2;
  uint64 cpu_shares = 3;
  int64 memory_limit_in_bytes = 4;
  int64 oom_score_adj = 5;
  string cpuset_cpus = 6;
  string cpuset_mems = 7;
  repeated HugepageLimit hugepage_limits = 8;
  map<string, string> unified = 9;
  int64 memory_swap_limit_in_bytes = 10;
}

message HugepageLimit {
  string page_size = 1;
  uint64 limit = 2;
}

message StatsRequest {
  string id = 1;
}

message StatsResponse {
  // Total CPU usage in nanoseconds.
  uint64 cpu_usage_ns = 1;
  // Current memory usage in bytes.
  uint64 memory_usage_bytes = 2;
  // Memory limit in bytes.
  uint64 memory_limit_bytes = 3;
  // Maximum memory usage observed in bytes.
  uint64 memory_max_usage_bytes = 4;
  // CPU usage in kernel mode in nanoseconds.
  uint64 cpu_kernel_ns = 5;
  // CPU usage in user mode in nanoseconds.
  uint64 cpu_user_ns = 6;
}
